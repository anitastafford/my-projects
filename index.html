<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
      background: #fafafa;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    p.subtitle {
      color: #666;
      margin-top: 0;
      margin-bottom: 40px;
    }
    ul#project-list {
      list-style: none;
      padding: 0;
    }
    ul#project-list li {
      margin-bottom: 12px;
    }
    ul#project-list a {
      display: block;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      font-weight: 600;
      transition: border-color 0.15s ease;
    }
    ul#project-list a:hover {
      border-color: #888;
    }
    .empty {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>My Projects</h1>
  <p class="subtitle">A collection of things I've built.</p>

  <!-- PROJECTS-LIST-START -->
  <ul id="project-list">
    <li><a href="bingo-2026/">Bingo 2026</a></li>
  </ul>
  <!-- PROJECTS-LIST-END -->
</body>
</html>
